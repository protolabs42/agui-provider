<html>
<head>
    <title>AG-UI Provider</title>
    <script type="module" src="/plugins/agui-provider/webui/agui-store.js"></script>
    <style>
        .agui { font-family: system-ui, -apple-system, sans-serif; color: inherit; }
        .agui-card { background: color-mix(in srgb, currentColor 8%, transparent); border: 1px solid color-mix(in srgb, currentColor 12%, transparent); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
        .agui-btn { padding: 8px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.85em; font-weight: 500; transition: all 0.15s; color: inherit; }
        .agui-btn:hover { filter: brightness(1.1); }
        .agui-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .agui-btn-primary { background: #6366f1; color: white; }
        .agui-btn-secondary { background: color-mix(in srgb, currentColor 10%, transparent); border: 1px solid color-mix(in srgb, currentColor 15%, transparent); }
        .agui-btn-danger { background: transparent; color: #e53e3e; border: 1px solid #e53e3e33; }
        .agui-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .agui-dot-green { background: #22c55e; box-shadow: 0 0 6px #22c55e66; }
        .agui-dot-red { background: #ef4444; }
        .agui-dot-pulse { background: #6366f1; animation: agui-pulse 2s infinite; }
        .agui-label { font-size: 0.7em; opacity: 0.5; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
        .agui-value { font-size: 0.9em; font-weight: 500; }
        .agui-mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.8em; background: color-mix(in srgb, currentColor 6%, transparent); padding: 6px 10px; border-radius: 6px; user-select: all; cursor: pointer; display: inline-block; word-break: break-all; }
        .agui-stat { text-align: center; padding: 8px 0; }
        .agui-stat-value { font-size: 1.6em; font-weight: 700; line-height: 1; }
        .agui-stat-label { font-size: 0.7em; opacity: 0.5; margin-top: 4px; }
        .agui-msg { padding: 10px 14px; border-radius: 8px; font-size: 0.85em; margin-top: 12px; }
        .agui-msg-success { background: #22c55e18; border: 1px solid #22c55e33; color: #16a34a; }
        .agui-msg-error { background: #ef444418; border: 1px solid #ef444433; color: #dc2626; }
        .agui-msg-info { background: #6366f118; border: 1px solid #6366f133; color: #6366f1; }
        .agui-fade-in { animation: agui-fadeIn 0.3s ease; }
        .agui-run-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 6px; background: color-mix(in srgb, currentColor 4%, transparent); margin-bottom: 4px; font-size: 0.8em; }
        @keyframes agui-fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes agui-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>
    <div x-data class="agui">
        <template x-if="$store.aguiProvider">
            <div x-init="$store.aguiProvider.onOpen()" x-destroy="$store.aguiProvider.cleanup()">

                <!-- Header -->
                <div style="display:flex; align-items:center; gap:10px; margin-bottom:16px;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style="flex-shrink:0;">
                        <rect width="24" height="24" rx="6" fill="#6366f1"/>
                        <path d="M7 12h10M12 7v10" stroke="white" stroke-width="2" stroke-linecap="round"/>
                        <circle cx="7" cy="12" r="1.5" fill="white"/>
                        <circle cx="17" cy="12" r="1.5" fill="white"/>
                        <circle cx="12" cy="7" r="1.5" fill="white"/>
                        <circle cx="12" cy="17" r="1.5" fill="white"/>
                    </svg>
                    <div>
                        <h2 style="margin:0; font-size:1.1em;">AG-UI Provider</h2>
                        <p style="margin:0; font-size:0.75em; opacity:0.5;">Connect any CopilotKit or AG-UI frontend to Agent Zero</p>
                    </div>
                </div>

                <!-- Server Status -->
                <div class="agui-card">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span class="agui-dot" :class="$store.aguiProvider.running ? 'agui-dot-green' : 'agui-dot-red'"></span>
                        <div style="flex:1;">
                            <strong style="font-size:0.9em;" x-text="$store.aguiProvider.running ? 'Server Running' : 'Server Stopped'"></strong>
                            <template x-if="$store.aguiProvider.running">
                                <div style="font-size:0.75em; opacity:0.5;">
                                    Port <span x-text="$store.aguiProvider.port"></span>
                                </div>
                            </template>
                        </div>
                        <template x-if="!$store.aguiProvider.running">
                            <button class="agui-btn agui-btn-primary"
                                    :disabled="$store.aguiProvider.starting"
                                    @click="$store.aguiProvider.start()">
                                <span x-text="$store.aguiProvider.starting ? 'Starting...' : 'Start Server'"></span>
                            </button>
                        </template>
                        <template x-if="$store.aguiProvider.running">
                            <button class="agui-btn agui-btn-danger"
                                    :disabled="$store.aguiProvider.stopping"
                                    @click="$store.aguiProvider.stop()">
                                <span x-text="$store.aguiProvider.stopping ? 'Stopping...' : 'Stop'"></span>
                            </button>
                        </template>
                    </div>
                </div>

                <!-- Stats Row -->
                <template x-if="$store.aguiProvider.running">
                    <div class="agui-fade-in" style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px;">
                        <div class="agui-card agui-stat">
                            <div class="agui-stat-value" :class="$store.aguiProvider.activeRunCount > 0 ? 'agui-dot-pulse' : ''"
                                 style="color:#6366f1;" x-text="$store.aguiProvider.activeRunCount"></div>
                            <div class="agui-stat-label">Active Runs</div>
                        </div>
                        <div class="agui-card agui-stat">
                            <div class="agui-stat-value" style="color:#6366f1;" x-text="$store.aguiProvider.port"></div>
                            <div class="agui-stat-label">Port</div>
                        </div>
                    </div>
                </template>

                <!-- Security Status -->
                <template x-if="$store.aguiProvider.running && $store.aguiProvider.config">
                    <div class="agui-card agui-fade-in">
                        <div class="agui-label" style="margin-bottom:8px;">Security</div>
                        <div style="display:flex; flex-wrap:wrap; gap:6px; font-size:0.75em;">
                            <span style="padding:3px 8px; border-radius:4px;"
                                  :style="$store.aguiProvider.config.auth_enabled ? 'background:#22c55e22; color:#16a34a;' : 'background:#ef444422; color:#dc2626;'"
                                  x-text="$store.aguiProvider.config.auth_enabled ? 'Auth: ON' : 'Auth: OFF'"></span>
                            <span style="padding:3px 8px; border-radius:4px; background: color-mix(in srgb, currentColor 8%, transparent);"
                                  x-text="'CORS: ' + ($store.aguiProvider.config.cors_origins || 'disabled')"></span>
                            <span style="padding:3px 8px; border-radius:4px; background: color-mix(in srgb, currentColor 8%, transparent);"
                                  x-text="'Max runs: ' + $store.aguiProvider.config.max_concurrent_runs"></span>
                            <span style="padding:3px 8px; border-radius:4px; background: color-mix(in srgb, currentColor 8%, transparent);"
                                  x-text="'Body limit: ' + Math.round($store.aguiProvider.config.max_body_size / 1024) + ' KB'"></span>
                        </div>
                    </div>
                </template>

                <!-- Auth Token -->
                <template x-if="$store.aguiProvider.running && $store.aguiProvider.config && $store.aguiProvider.config.auth_token">
                    <div class="agui-card agui-fade-in" x-data="{ revealed: false }">
                        <div class="agui-label">Auth Token</div>
                        <div style="display:flex; align-items:center; gap:8px;">
                            <div class="agui-mono" style="flex:1;"
                                 x-text="revealed ? $store.aguiProvider.config.auth_token : '••••••••••••••••'"
                                 @click="navigator.clipboard.writeText($store.aguiProvider.config.auth_token); $store.aguiProvider.message = {type:'info', text:'Token copied to clipboard'}"
                                 title="Click to copy"></div>
                            <button class="agui-btn agui-btn-secondary" style="padding:5px 10px; font-size:0.75em;"
                                    @click="revealed = !revealed"
                                    x-text="revealed ? 'Hide' : 'Show'"></button>
                        </div>
                        <p style="font-size:0.7em; opacity:0.4; margin:6px 0 0 0;">
                            Auto-generated on first run. Clients must send <code>Authorization: Bearer &lt;token&gt;</code>
                        </p>
                    </div>
                </template>

                <!-- Endpoint URL -->
                <template x-if="$store.aguiProvider.running">
                    <div class="agui-card agui-fade-in">
                        <div class="agui-label">AG-UI Endpoint</div>
                        <div class="agui-mono"
                             x-text="$store.aguiProvider.url || ('http://localhost:' + $store.aguiProvider.port)"
                             @click="navigator.clipboard.writeText($store.aguiProvider.url || ('http://localhost:' + $store.aguiProvider.port)); $store.aguiProvider.message = {type:'info', text:'Copied to clipboard'}"
                             title="Click to copy"></div>
                        <p style="font-size:0.7em; opacity:0.4; margin:8px 0 0 0;">
                            POST messages to this URL from any AG-UI compatible frontend
                        </p>
                    </div>
                </template>

                <!-- Active Runs -->
                <template x-if="$store.aguiProvider.running && $store.aguiProvider.activeRuns.length > 0">
                    <div class="agui-card agui-fade-in">
                        <div class="agui-label" style="margin-bottom:8px;">Active Runs</div>
                        <template x-for="run in $store.aguiProvider.activeRuns" :key="run.run_id">
                            <div class="agui-run-item">
                                <span class="agui-dot agui-dot-pulse"></span>
                                <div style="flex:1; min-width:0;">
                                    <div style="font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"
                                         x-text="run.run_id"></div>
                                    <div style="font-size:0.85em; opacity:0.5;" x-text="'Thread: ' + run.thread_id"></div>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>

                <!-- Quick Start Guide (when stopped) -->
                <template x-if="!$store.aguiProvider.running">
                    <div class="agui-card agui-fade-in" style="opacity:0.7;">
                        <div class="agui-label" style="margin-bottom:8px;">Quick Start</div>
                        <ol style="margin:0; padding-left:20px; font-size:0.8em; line-height:1.8;">
                            <li>Start the server above</li>
                            <li>Point your CopilotKit frontend to the endpoint URL</li>
                            <li>Send messages — Agent Zero handles the rest</li>
                        </ol>
                    </div>
                </template>

                <!-- Message Toast -->
                <template x-if="$store.aguiProvider.message">
                    <div class="agui-msg agui-fade-in"
                         :class="'agui-msg-' + ($store.aguiProvider.message.type || 'info')"
                         x-text="$store.aguiProvider.message.text"
                         x-init="setTimeout(() => $store.aguiProvider.message = null, 4000)">
                    </div>
                </template>

            </div>
        </template>
    </div>
</body>
</html>
